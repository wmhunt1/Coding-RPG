<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="Scripts.js"></script>
</head>
<body>
    <header>
        <h1>Coding RPG</h1>
    </header>
    <nav>
        <ul>
                <li><a href="index.html">Home (H)</a></li>
                <li>Arena (A)</li>
                <li><a href="character.html">Character (C)</a></li>
                <li>Downtime (D)</li>
                <li>Inventory (I)</li>
                <li>Journal (J)</li>

                <li><a href="rest.html">Rest (R)</a></li>
                <li>Shop (S)</li>
                <li>Train (T)</li>
        </ul>
    </nav>
    <!-- don't update -->
    <section id="stats">
        <button onclick="CurrentDay()">Day</button>
        <button onclick="CurrentFame()">Fame</button>
        <h2> Day</h2>
        <p id="Day"></p>
        <h2> Fame</h2>
        <p id="Fame"></p>
    </section>
    <section class ="options">
        <h2>Killing Rats in the Tavern Cellar (1-5 rats)</h2>
        <button onclick="Rat_Quest()">Accept</button>
    </section>
    <script>
        function CurrentDay()
        {
            alert ("It is the Day " + Day)
        }
        function CurrentFame()
        {
            alert ("You have " + Player.Fame + " Fame")
        }
        document.getElementById("Day").innerHTML = (Day);
        document.getElementById("Fame").innerHTML = (Player.Fame);
        //quest functions
        function QuestComplete(x)
        {
            AddXP(x*10)
            AddGold(x*10)
            AddFame(x)
            alert ("You gain: " + x*10 + " XP")
            alert ("You gain: " + x*10 + " Gold")
            alert ("You gain: " + x + " Fame")
        }
        // Rat Quest
        function Rat_Quest()
        {
            if (Player.CurrentHP <= 0)  
            {
                alert ("You can't go questing in your condition")
            } 
            else
            {   
                Enemy = 
                    {
                        Name: "Rat",
                        CurrentHP: 2,
                        MaxHP: 2,
                        Atk: 1,
                        Wep: "Bite",
                        Armor: 0,
                        Dead: false,
                    }
                var rats = Math.floor(Math.random() * 5+1);
                alert ("Time to kill some rats")
                alert ("You must kill " + rats + " rats")
                for (var rats_killed = 0; rats_killed < rats && Player.CurrentHP > 0;)
                {
                    Combat()
                    if (Enemy.CurrentHP <= 0)
                    {
                        rats_killed += 1;
                        alert ("You managed to kill one of the rats.")
                    }
                    else 
                    {
                        alert ("You damage a rat")
                        //so nothing happens if rat alive
                    }
                    alert (Player.CurrentHP + " HP")
                    alert (rats_killed + " Rats Killed")
                }
                if (Player.CurrentHP > 0)
                {
                    QuestComplete(rats)
                }
                else
                {
                    alert ("you fall unconscious.")
                }
            }


        }

    </script>
</body>
</html>
