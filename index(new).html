<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding RPG</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="gamescripts.js"></script>
</head>
<body>
    <header id = "Title">
        <h1>Coding RPG</h1>
    </header>
    <nav>
        <ul>
                <li><a href="#Intro">Home (H)</a></li>
                <li><a href="#Arena">Arena (C)</a></li>
                <li><button id="charBtn">Character</button></li>
                <li><a href="#Downtime">Downtime (D)</a></li>
                <li><a href="#Factions">Factions (F)</a></li>
                <li><button id="invBtn">Inventory</button></li>
                <li><a href="#Journal">Journal (Q)</li>
                <li><a href="#Quest">Quest (Q)</a></li>
                <li><a href="#Rest">Rest (R)</a></li>
                <li><a href="#Shop">Shop (B)</a></li>
                <li><a href="#Skills">Skills (S)</a></li>
                <li><a href="#Train">Train (T)</a></li>
        </ul>
    </nav>
    <!-- character sheet modal -->
    <div id="charModal" class="modal">
        <div class="modal-content">
        <span class="close">&times;</span>
        <h1>Character Sheet</h1>
        <p>Some text in the Modal..</p>
        </div>
    </div>
    <div id="invModal" class="modal">
        <div class="modal-content">
        <span class="close">&times;</span>
        <h1>Inventory</h1>
        <p>Some text in the Modal..</p>
        </div>
    </div>
    <!-- Trigger/Open The Modal -->
<button id="myBtn">Open Modal</button>

<!-- The Modal -->
<div id="myModal" class="modal">

  <!-- Modal content -->
  <div class="modal-content">
    <span class="close">&times;</span>
    <p>Some text in the Modal..</p>
  </div>

</div>
<script>
    //character sheet modal
    var char_modal = document.getElementById("charModal");
    var char_btn = document.getElementById("charBtn");
    char_btn.onclick = function()
    {
        char_modal.style.display = "block";
    }
    var char_span = document.getElementsByClassName("close")[0];
    char_span.onclick = function()
    {
        char_modal.style.display = "none";
    }
    window.onclick = function(event)
    {
        if (event.target == char_modal)
        {
            char_modal.style.display = "none";
        }
    }
    //inventory sheet modal
    var inv_modal = document.getElementById("invModal");
    var inv_btn = document.getElementById("invBtn");
    inv_btn.onclick = function()
    {
        inv_modal.style.display = "block";
    }
    var inv_span = document.getElementsByClassName("close")[0];
    inv_span.onclick = function()
    {
        inv_modal.style.display = "none";
    }
    window.onclick = function(event)
    {
        if (event.target == inv_modal)
        {
            inv_modal.style.display = "none";
        }
    }
var modal = document.getElementById("myModal");

// Get the button that opens the modal
var btn = document.getElementById("myBtn");

// Get the <span> element that closes the modal
var span = document.getElementsByClassName("close")[0];

// When the user clicks on the button, open the modal
btn.onclick = function() {
  modal.style.display = "block";
}

// When the user clicks on <span> (x), close the modal
span.onclick = function() {
  modal.style.display = "none";
}

// When the user clicks anywhere outside of the modal, close it
window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
