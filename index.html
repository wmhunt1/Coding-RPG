<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding RPG</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header>
        <h1>Coding RPG</h1>
    </header>
    <nav>
        <ul>
                <li>Character (C)</li>
                <li>Inventory (I)</li>
                <li>Journal (J)</li>
                <li>Quest (Q)</li>
                <li>Rest (R)</li>
                <li>Shop (S)</li>
                <li>Train (T)</li>
        </ul>
    </nav>
    <script type="text/javascript">
    // global variables
        var Player = 
        {
            Name: "Character",
            Level: 1,
            CurrentHP: 10,
            MaxHP: 10,
            Gold: 0,
            Atk: 2,
            Armor: 1,
            Dead: false,
        }
        // Need to figure out how to fill this for each enemy or make it a template
        var Enemy = 
        {
            Name: "N",
            CurrentHP: 0,
            MaxHP: 0,
            Atk: 0,
            Armor: 0,
            Dead: false,
        }
    // functions
        function DMGPlayer()
        {
            //Should reduce damage by armor amount
            Player.CurrentHP = Player.CurrentHP - (Enemy.Atk - Player.Armor);
            //should kill player when HP is reduced to 0
            When (Player.CurrentHP <= 0)
            {
                Player.Dead = true;
            }
        }
        function DMGEnemy()
        {
            //should reduce damage by armor amount
            Enemy.CurrentHP = Enemy.CurrentHP - (Player.Atk - Enemy.Armor);
            When (Enemy.CurrentHP <= 0)
            {
                Enemy.Dead = true;
            }
        }
        function LevelUp()
        {
            Player.Level += 1;
            MaxHP += 10;
        }
        function AddGold(x)
        {
            Player.Gold += x;
        }
        function RemoveGold(x)
        {
            Player.Gold -= x;
        }
        function Rest()
        {
            Player.CurrentHP = Player.MaxHP;
        }
        function UseItem()
        {
            //Need to make items
        }
    </script>
</body>
</html>
