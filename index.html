<body>
    <header>
        <h1>Coding RPG</h1>
    </header>
    <nav>
        <ul>
                <li>Character</li>
                <li>Quest</li>
        </ul>
    </nav>
    <script type="text/javascript">
    // global variables
        var Player = 
        {
            Name = "Character",
            CurrentHP = 10,
            MaxHP = 10,
            Level = 1,
            Gold = 0,
            Atk = 2,
            Armor = 1,
            Dead = false,
        }
        var Enemy = 
        {
            Name = "Enemy"
            CurrentHP = 10,
            MaxHP = 10,
            Atk = 1,
            Armor = 0,
            Dead = false,
        }
    // functions
        function DMGPlayer(x)
        {
            Player.CurrentHP = Player.CurrentHP - (Enemy.Atk - Player.Armor);
        }
        function DMGEnemy(x)
        {
            Enemy.CurrentHP = Enemy.CurrentHP - (Player.Atk - Enemy.Armor);
        }
    </script>
</body>
