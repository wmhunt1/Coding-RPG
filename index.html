<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding RPG</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>

<body>
    <header id="Title">
        <h1>Coding RPG</h1>
    </header>
    <nav id="Menu">
        <h1>Menu</h1>
        <ul>
            <!-- <li><button onclick="arena()">(A)rena</button></li>
            <li><button onclick="character()">(C)haracter</button></a></li>
            <li><button onclick="downtime()">(D)owntime</button></li>
            <li><button onclick="equipment()">(E)quipment</button></li>
            <li><button onclick="factions()">(F)actions</button></li>
            <li><button onclick="inventory()">(I)nventory</button></li>
            <li><button onclick="journal()">(J)ournal</button></li>
            <li><button onclick="quest()">(Q)uest</button></li>
             <li><button onclick="rest()">(R)est</button></li>
            <li><button onclick="shopping()">(S)hopping</button></li>
            <li><button onclick="skill()">Skills and (P)owers</button></li>
            <li><button onclick="training()">(T)raining</button></li> -->
        </ul>
    </nav>
    <section id="Intro">
        <h1>Intro</h1>
        <article>
            <p>Game Intro.</p>
            <button onclick=createHero() class="margin">Character Creation</button>
        </article>
    </section>
    <!-- area sections, have buttons for areas or shops etc. -->
    <section id="valleyDale">
        <h1>The Valley of Dale</h1>
        <button id="banditCamp">Bandit Camp</button>
        <button id="banditHideout">Bandit Hideout</button>
        <button id="bbVillage">Broken Blade Village</button>
        <button id=daleKeep>Dale Keep</button>
        <button id="dMine">Dwarven Mine</button>
        <button id="dOutpost">Dwarven Outpost</button>
        <button id="giantCave">Giant Cave</button>
        <button id="gnollDen">Gnoll Den</button>
        <button id="goblinVillage">Goblin Village</button>
        <button id="kurekHut">Kurek's Hut</button>
        <button id="lakeDale">Lake Dale</button>
        <button id="logCamp">Logging Camp</button>
        <button id="ruins">Ruins</button>
        <button id="sheepLair">Sheepscale's Lair</button>
        <button id="sheepPasture">Sheep Pasture</button>
        <button id="spiderCave">Spider Cave</button>
        <button onclick="tollBridgeEncounter()">Toll Bridge</button>
        <button id="tradePost">Trading Post</button>
        <button id="villageDaleBtn" onclick="enterVillageDale()">Village of Dale</button>
        <button id="witchCottage">Witch's Cottage</button>
        <button id="wizardTower">Wizard Tower</button>
        <button onclick="worldMap()">Leave Valley</button>
    </section>
    <section id="villageDale">
        <h1>The Village of Dale</h1>
        <button>Abraham's House</button>
        <button>Dale Graveyard</button>
        <button>Dale Manor</button>
        <button onclick="dreamingWorker.enterStore()">The Dreaming Worker Inn</button>
        <button onclick="forgeheartSmith.enterStore()">Forgeheart Smithy</button>
        <button>Littleroot Farm</button>
        <button>Quincy's Workshop</button>
        <button>Temple</button>
        <button>Trig Sprocket's Goods and Sundries</button>
        <button onclick="enterValleyDale()">Leave</button>
    </section>

    <script src="./modules/character.js"></script>
    <script src="./modules/classes.js"></script>
    <script src="./modules/combat.js"></script>
    <script src="./modules/dungeons.js"></script>
    <script src="./modules/items.js"></script>
    <script src="./modules/quests.js"></script>
    <script src="./modules/settlements.js"></script>
    <script src="./modules/skills.js"></script>
    <script src="./modules/stores.js"></script>
    <script src="gamescripts.js"></script>
    <script>
        //hides buttons until location discovered
        document.getElementById("Menu").style.display = "block";
        document.getElementById("banditCamp").style.display = "none";
        document.getElementById("banditHideout").style.display = "none";
        document.getElementById("bbVillage").style.display = "none";
        document.getElementById("daleKeep").style.display = "none";
        document.getElementById("dMine").style.display = "none";
        document.getElementById("dOutpost").style.display = "none";
        document.getElementById("dMine").style.display = "none";
        document.getElementById("giantCave").style.display = "none";
        document.getElementById("gnollDen").style.display = "none";
        document.getElementById("goblinVillage").style.display = "none";
        document.getElementById("kurekHut").style.display = "none";
        document.getElementById("lakeDale").style.display = "none";
        document.getElementById("logCamp").style.display = "none";
        document.getElementById("ruins").style.display = "none";
        document.getElementById("sheepLair").style.display = "none";
        document.getElementById("sheepPasture").style.display = "none";
        document.getElementById("spiderCave").style.display = "none";
        document.getElementById("tradePost").style.display = "none";
        document.getElementById("villageDaleBtn").style.display = "none";
        document.getElementById("witchCottage").style.display = "none";
        document.getElementById("wizardTower").style.display = "none";
        function closeAll() {
            document.getElementById("Intro").style.display = "none";
            document.getElementById("valleyDale").style.display = "none";
            document.getElementById("villageDale").style.display = "none";
        }
        function intro() {
            closeAll()
            document.getElementById("Intro").style.display = "block";
        }
        function enterValleyDale() {
            closeAll
            document.getElementById("Intro").style.display = "none"
            document.getElementById("valleyDale").style.display = "block";
            document.getElementById("villageDale").style.display = "none";
        }
        function enterVillageDale() {
            closeAll()
            alert("You enter The Village of Dale.")
            document.getElementById("valleyDale").style.display = "none";
            document.getElementById("villageDale").style.display = "block";
        }
        intro()
        function worldMap() {
            alert("You cannot leave The Valley of Dale")
        }
    </script>
</body>

</html>
