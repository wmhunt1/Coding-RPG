<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.15.1/dist/phaser-arcade-physics.min.js"></script>
</head>

<body>

    <script>
        var config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 }
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        var player;
        var cursors;
        var star;
        var game = new Phaser.Game(config);

        function preload() {
            this.load.image('village', '/assets/images/village.png');
            this.load.image('star', '/assets/images/star.png');
            this.load.spritesheet('red',
                '/assets/images/red.png',
                { frameWidth: 64, frameHeight: 64 }
            );
        }

        function create() {
            //this.add.image(400, 300, 'village');
            player = this.physics.add.sprite(400, 300, 'red');
            player.setCollideWorldBounds(true);

            this.anims.create({
                key: 'left',
                frames: this.anims.generateFrameNumbers('red', { start: 4, end: 7 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'right',
                frames: this.anims.generateFrameNumbers('red', { start: 8, end: 11 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'up',
                frames: this.anims.generateFrameNumbers('red', { start: 0, end: 3 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'down',
                frames: this.anims.generateFrameNumbers('red', { start: 12, end: 15 }),
                frameRate: 10,
                repeat: -1
            });
            cursors = this.input.keyboard.createCursorKeys();
            this.anims.create({
                key: 'turn',
                frames: [{ key: 'red', frame: 0 }],
                frameRate: 20
            });
            star = this.physics.add.sprite(100, 450, 'star');
            this.physics.add.overlap(player, star, battle, null, this);

        }
        function update() {
            if (cursors.left.isDown) {
                console.log("left")
                player.setVelocityX(-160);

                player.anims.play('left', true);
            }
            else if (cursors.right.isDown) {
                console.log("right")
                player.setVelocityX(160);

                player.anims.play('right', true);
            }
            else if (cursors.down.isDown) {
                console.log("down")
                player.setVelocityY(160);

                player.anims.play('up', true);
            }
            else if (cursors.up.isDown) {
                console.log("up")
                player.setVelocityY(-160);

                player.anims.play('down', true);
            }
            else {
                player.setVelocityX(0);
                player.setVelocityY(0);
                player.anims.play('turn');
            }

        }
        function battle(player, star) {
            star.disableBody(true, true);
            alert("fight")
            player.setVelocityX(0);
            player.setVelocityY(0);
            player.anims.play('turn');
        }
    </script>

</body>

</html>
