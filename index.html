<body>

    <section id="Intro">
        <h1>Intro</h1>
        <article>
            <p>Game Intro.</p>
            <button onclick=createHero() class="margin">Character Creation</button>
        </article>
    </section>
    <!-- area sections, have buttons for areas or shops etc. -->
    <section id="valleyDale">
        <h1>The Valley of Dale</h1>
        <button onclick="combatTest()">Combat Test</button>
        <button onclick="testFeature()">Test Feature</button>
        <button id="banditCamp">Bandit Camp</button>
        <button id="banditHideout">Bandit Hideout</button>
        <button id="bbVillage">Broken Blade Village</button>
        <button id=daleKeep>Dale Keep</button>
        <button onclick="dwarvenMine.enterPlace()" id="dMine">Dwarven Mine</button>
        <button id="dOutpost">Dwarven Outpost</button>
        <button id="giantCave">Giant Cave</button>
        <button id="gnollDen">Gnoll Den</button>
        <button id="goblinVillage">Goblin Village</button>
        <button id="kenkuCamp">Kenku Camp</button>
        <button id="kurekHut">Kurek's Hut</button>
        <button id="lakeDale">Lake Dale</button>
        <button id="logCamp">Logging Camp</button>
        <button id="ruins">Ruins</button>
        <button id="sheepLair">Sheepscale's Lair</button>
        <button id="sheepPasture">Sheep Pasture</button>
        <button id="spiderCave">Spider Cave</button>
        <button onclick="tollBridge.enterPlace()">Toll Bridge</button>
        <button id="tradePost">Trading Post</button>
        <button id="villageDaleBtn" onclick="villageDale.enterPlace()">Village of Dale</button>
        <button id="witchCottage">Witch's Cottage</button>
        <button id="wizardTower">Wizard Tower</button>
        <button onclick="valleyDale.exitPlace()">World Map</button>
    </section>
    <section id="villageDale">
        <h1>The Village of Dale</h1>
        <button>Abraham's House</button>
        <button>Dale Graveyard</button>
        <button>Dale Manor</button>
        <button onclick="dreamingWorker.enterStore(hero.journal.metWithContact, false)">The Dreaming Worker Inn</button>
        <button onclick="forgeheartSmithy.enterStore(hero.journal.goblinSlayer, true)">Forgeheart Smithy</button>
        <button>Littleroot Farm</button>
        <button>Quincy's Workshop</button>
        <button>Temple</button>
        <button onclick="triggShop.enterStore()">Trig Sprocket's General Goods and Sundries</button>
        <button onclick="villageDale.exitPlace()">Leave</button>
    </section>
    <section id="mineDungeon">
        <button onclick="dwarvenMine.exitPlace()">Leave Area</button>
        <button onclick="mineDungeon.encounter2()" id="mee">Mine Exterior Encounter</button>
        <button onclick="mineDungeon.encounter3()" id="em">Enter Mine</button>
        <button onclick="mineDungeon.encounter4()" id="mi1">Mine Interior 1</button>
        <button onclick="mineDungeon.encounter5()" id="fk">Free Kobolds</button>
        <button onclick="mineDungeon.encounter6()" id="mi2">Mine Interior 2</button>
        <button onclick="mineDungeon.encounter7()" id="fm">Free Miners</button>
        <button onclick="mineDungeon.encounter8()" id="mi3">Mine Interior 3</button>
        <button onclick="mineDungeon.encounter9()" id="gBoss">Goblin Boss</button>
    </section>
    <section id="puzzleDungeon1"></section>
