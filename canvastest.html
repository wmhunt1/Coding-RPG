<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Test</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>

<body>
    <div id="game"></div>
    <script>
        var gameTitle = $("<h1>").text("Coding RPG").attr
            ({
            });
        $("#game").append(gameTitle);
        var gameArea = $("<canvas>").attr
            ({
                "id": gameArea,
                "height": 500,
                "width": 500,
            });
        $("#game").append(gameArea);
        var heroImage = "assets/blueCircle.png";
        var hero = $("<img>").attr("src", heroImage);
        gameArea.append(hero);
    </script>
</body>

</html>
