    <section class ="options">
        <h2>Rent a Bed at the Inn?</h2>
        <button onclick="Inn()">Accept</button>
        <h2>Rest at Home?</h2>
        <button onclick="Home()">Accept</button>
        <h2>Sleep on the Street?</h2>
        <button onclick="Street()">Accept</button>
    </section>
    <script>
        function Inn()
        {
            if (Player.Gold < 10)
            {
                alert ("You cannot afford to stay at the inn.")
            }
            else
            {
                Rest()
                RemoveGold(10)
                console.log(Player.Gold)
            }
        }
        function Home()
        {
            if (Player.HomeOwner != true)
            {
                alert("You don't have a house.")
            }
            else
            {
                Rest()
            }
        }
        function Street()
        {
            alert ("You sleep on the street but it isn't very restful.")
            Bad_Rest()

        }
    </script>
