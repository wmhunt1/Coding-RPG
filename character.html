<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="scripts.js"></script>
</head>
<body>
    <header>
        <h1>Coding RPG</h1>
    </header>
    <nav>
        <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="character.html">Character</a></li>
                <li>Inventory (I)</li>
                <li>Journal (J)</li>
                <li>Quest (Q)</li>
                <li>Rest (R)</li>
                <li>Shop (S)</li>
                <li>Train (T)</li>
        </ul>
    </nav>
    <section id="stats">
        <h2> Name</h2>
        <p id="Name"></p>
        <h2> Level</h2>
        <p id="Level"></p>
        <h2> Current HP</h2>
        <p id="CHP"></p>
        <h2> Max HP</h2>
        <p id="MHP"></p>
        <h2> Gold</h2>
        <p id="Gold"></p>
        <h2> Attack</h2>
        <p id="ATK"></p>
        <h2> Armor</h2>
        <p id="DEF"></p>
    </section>
    <script>
           document.getElementById("Name").innerHTML = Player.Name;
           document.getElementById("Level").innerHTML = Player.Level;
           document.getElementById("CHP").innerHTML = Player.CurrentHP;
           document.getElementById("MHP").innerHTML = Player.MaxHP;
           document.getElementById("Gold").innerHTML = Player.Gold;
           document.getElementById("ATK").innerHTML = Player.Atk;
           document.getElementById("DEF").innerHTML = Player.Armor;
    </script>
</body>
</html>
